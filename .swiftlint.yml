# SwiftLint configuration. Run via `swiftlint --strict`.
# Rationale: docs/04-technical-architecture.md §1 (zero warnings, zero force-unwraps).

included:
  - GhosttyConfigurator
  - GhosttyConfiguratorTests

excluded:
  - .build
  - DerivedData
  - GhosttyConfigurator.xcodeproj

opt_in_rules:
  - empty_collection_literal
  - empty_string
  - explicit_init
  - first_where
  - last_where
  - fatal_error_message
  - force_unwrapping
  - implicitly_unwrapped_optional
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - unused_optional_binding

disabled_rules:
  # Conflicts with our 4-space indent / 120-column style.
  - trailing_whitespace
  # SwiftUI body blocks are dense by nature.
  - function_body_length
  - type_body_length
  # swiftformat owns brace placement (`wrapMultilineStatementBraces`) and
  # puts `{` on its own line for multi-line conditions, which conflicts
  # with swiftlint's same-line preference.
  - opening_brace
  # Test fixtures use `var foo: Type!` populated in setUp — XCTestCase
  # idiom, not a real warning.
  - implicitly_unwrapped_optional

force_unwrapping:
  severity: error

force_cast:
  severity: error

force_try:
  severity: error

line_length:
  warning: 350
  error: 400
  ignores_comments: true
  ignores_urls: true
  ignores_function_declarations: true

identifier_name:
  min_length: 1
  max_length:
    warning: 50
    error: 60

# Catalog/enum files are inherently long. Raise the bar rather than splitting
# them artificially — the contents are flat tables, not deep nesting.
file_length:
  warning: 1200
  error: 1500
  ignore_comment_only_lines: true

# `KV` is the idiomatic 2-letter abbreviation for key-value entries inside the
# config parser; `iTerm2` is the proper product name (lowercase `i` is part
# of Apple's "i-prefix" branding).
type_name:
  min_length: 2
  allowed_symbols: ["_"]
  validates_start_with_lowercase: false

# A handful of functions are intrinsically branchy (keybind parser, search
# scoring) — split them and you just push complexity into a chain of helpers.
cyclomatic_complexity:
  warning: 15
  error: 30
  ignores_case_statements: true

# `(r: Int, g: Int, b: Int)` is fine as an ad-hoc return type. We'd just have
# to name a wrapper struct that's used in exactly one place.
large_tuple:
  warning: 3
  error: 4

# Custom rule: ban print() — use os.Logger via Logging.swift.
custom_rules:
  no_print:
    name: "No print()"
    regex: '\bprint\('
    match_kinds:
      - identifier
    message: "Use Logger from Logging.swift, not print()."
    severity: error
  no_combine:
    name: "No Combine"
    regex: '^import Combine'
    message: "Combine is banned. Use @Observable + async/await + AsyncStream."
    severity: error
  no_observable_object:
    name: "No ObservableObject"
    regex: '\b(ObservableObject|@Published|@StateObject|@ObservedObject|@EnvironmentObject)\b'
    message: "Use @Observable + @Environment. See docs/04-technical-architecture.md §5.3."
    severity: error
