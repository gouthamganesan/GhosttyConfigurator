# SwiftLint configuration. Run via `swiftlint --strict`.
# Rationale: docs/04-technical-architecture.md §1 (zero warnings, zero force-unwraps).

included:
  - GhosttyConfigurator
  - GhosttyConfiguratorTests

excluded:
  - .build
  - DerivedData
  - GhosttyConfigurator.xcodeproj

opt_in_rules:
  - empty_collection_literal
  - empty_string
  - explicit_init
  - first_where
  - last_where
  - fatal_error_message
  - force_unwrapping
  - implicitly_unwrapped_optional
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - unused_optional_binding

disabled_rules:
  # Conflicts with our 4-space indent / 120-column style.
  - trailing_whitespace
  # SwiftUI body blocks are dense by nature.
  - function_body_length
  - type_body_length

force_unwrapping:
  severity: error

force_cast:
  severity: error

force_try:
  severity: error

line_length:
  warning: 120
  error: 140
  ignores_comments: true
  ignores_urls: true

identifier_name:
  min_length: 1
  max_length:
    warning: 50
    error: 60

# Custom rule: ban print() — use os.Logger via Logging.swift.
custom_rules:
  no_print:
    name: "No print()"
    regex: '\bprint\('
    match_kinds:
      - identifier
    message: "Use Logger from Logging.swift, not print()."
    severity: error
  no_combine:
    name: "No Combine"
    regex: '^import Combine'
    message: "Combine is banned. Use @Observable + async/await + AsyncStream."
    severity: error
  no_observable_object:
    name: "No ObservableObject"
    regex: '\b(ObservableObject|@Published|@StateObject|@ObservedObject|@EnvironmentObject)\b'
    message: "Use @Observable + @Environment. See docs/04-technical-architecture.md §5.3."
    severity: error
