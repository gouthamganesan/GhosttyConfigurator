name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Lint (macOS 15, default Xcode)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        # xcodegen 2.45.4 produces project files with objectVersion=77
        # (Xcode 17 format). Stay on the runner's default Xcode rather
        # than pinning an older one that can't read it.
        run: xcodebuild -version

      - name: Install XcodeGen + SwiftLint + SwiftFormat
        # `brew update` pulls newer formulae than the runner image's cache —
        # in particular SwiftLint 0.63.3+ fixed false-positive
        # `force_unwrapping` flags on plain boolean negations
        # (`!foo.isEmpty`). Without the update step CI uses 0.63.2 and
        # fails locally-passing code.
        run: |
          brew update
          brew install xcodegen swiftlint swiftformat
          swiftlint version
          swiftformat --version

      - name: Generate Xcode project
        run: xcodegen generate

      - name: SwiftFormat lint
        run: swiftformat --lint .

      - name: SwiftLint strict
        run: swiftlint --strict --reporter github-actions-logging

      - name: Build (Debug)
        run: |
          xcodebuild \
            -project GhosttyConfigurator.xcodeproj \
            -scheme GhosttyConfigurator \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build | xcbeautify --renderer github-actions

      - name: Build (Release)
        # `set -o pipefail` so a real xcodebuild failure isn't masked by
        # xcbeautify always exiting 0. Also pin -derivedDataPath so the
        # bundle-size gate knows where to look.
        run: |
          set -o pipefail
          xcodebuild \
            -project GhosttyConfigurator.xcodeproj \
            -scheme GhosttyConfigurator \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build | xcbeautify --renderer github-actions
          echo "--- post-build directory listing ---"
          ls -la build/Build/Products/Release/ || ls -la build/ || true

      - name: Bundle-size gate (Release < 8 MB)
        run: |
          # The CI runner sometimes ignores -derivedDataPath; search a few
          # plausible locations before giving up.
          APP=""
          for candidate in \
            "build/Build/Products/Release/GhosttyConfigurator.app" \
            "$HOME/Library/Developer/Xcode/DerivedData"/*/Build/Products/Release/GhosttyConfigurator.app \
            "/tmp"/*/Build/Products/Release/GhosttyConfigurator.app; do
            if [ -d "$candidate" ]; then APP="$candidate"; break; fi
          done
          if [ -z "$APP" ]; then
            echo "No Release .app found. Searched candidates:"
            find "$HOME/Library/Developer/Xcode/DerivedData" -name "GhosttyConfigurator.app" 2>/dev/null || true
            find "$(pwd)" -name "GhosttyConfigurator.app" 2>/dev/null || true
            exit 1
          fi
          echo "Found .app at: $APP"
          SIZE_KB=$(du -k "$APP" | tail -1 | cut -f1)
          echo "App bundle size: ${SIZE_KB} KB"
          if [ "$SIZE_KB" -gt 8192 ]; then
            echo "FAIL: app bundle ${SIZE_KB} KB exceeds 8 MB gate (see docs/04-technical-architecture.md §1)"
            exit 1
          fi
